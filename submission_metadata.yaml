# submission_metadata.yaml
# Required alongside submission.csv for Redrob AI Hackathon
# Fill in team-specific fields before submitting

# ─── Identity ─────────────────────────────────────────────────────────────
team_name: "Team Aditya"
primary_contact: "adityacodes404@gmail.com"

# ─── Repository & Demo ────────────────────────────────────────────────────
github_repo: "https://github.com/Adityakeerti/resumeRankerAi"
sandbox_link: "https://huggingface.co/spaces/adityacodes404/redrob-ranker"

# ─── Reproduce Command ────────────────────────────────────────────────────
# This must produce submission.csv in ≤ 5 minutes on CPU, 16 GB RAM, no network
reproduce_command: >
  python rank.py
  --candidates ./candidates.jsonl
  --jd ./job_description.docx
  --precomputed ./data/
  --out ./submission.csv

# ─── Compute Constraints ──────────────────────────────────────────────────
compute:
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_command: >
    python precompute.py
    --candidates ./candidates.jsonl
    --out ./data/
  pre_computation_time_minutes: 45   # approximate, on standard CPU
  ranking_time_minutes: 1            # < 60 seconds observed

# ─── Methodology ──────────────────────────────────────────────────────────
methodology_summary: >
  Hybrid multi-stage pipeline. Offline: bi-encoder embeddings (all-MiniLM-L6-v2),
  BM25 index, trust-weighted structured feature extraction, honeypot detection, and
  disqualifier penalty pre-computation. Online: JD embedded at runtime, cosine sim
  over 100K candidates (~0.5s), BM25 lexical scoring (~3s), weighted Stage 1 fusion
  to select top-500, cross-encoder (ms-marco-MiniLM-L-6-v2) reranking (~25s), final
  Stage 2 fusion, and fact-grounded reasoning generation. Key differentiators:
  trust-weighted skills (proficiency × duration × endorsements × assessment),
  product-vs-consulting career split, behavioral availability scoring, 7-check
  honeypot detection, and 9 disqualifier penalty categories. Anti-keyword-stuffing
  is central—career descriptions are weighted above skills lists in text representation.

# ─── AI Tools Used (declaration) ─────────────────────────────────────────
ai_tools_used:
  - "Claude (Anthropic) — architecture design and code generation assistance"
  - "sentence-transformers library (HuggingFace) — bi-encoder and cross-encoder models"
  - "rank-bm25 library — BM25 lexical scoring"

# ─── Declarations ─────────────────────────────────────────────────────────
declarations:
  honeypot_check_done: true
  reproduction_tested: true
  no_test_set_leakage: true
  team_members_understand_approach: true
